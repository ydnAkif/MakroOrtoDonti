name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Install browser runtime
        run: python -m playwright install --with-deps chromium
      - name: Compile Python sources
        run: python -m compileall -q app backup.py deployment_check.py production_drill.py run.py run_production.py
      - name: Run tests with branch coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=90
